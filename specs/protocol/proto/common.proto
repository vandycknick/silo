syntax = "proto3";

package bento.v1;

message Empty {}

message SystemInfo {
  string kernel_version = 1;
  string os_name = 2;
  string os_version = 3;
  string arch = 4;
  uint64 total_memory = 5;
  uint64 available_memory = 6;
  uint32 cpu_count = 7;
  repeated double load_average = 8;
  string hostname = 9;
  uint64 uptime = 10;
  repeated string ip_addresses = 11;
}
