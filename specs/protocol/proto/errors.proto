syntax = "proto3";

package silo.v1;

import "google/protobuf/duration.proto";

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_INVALID_REQUEST = 1;
  ERROR_CODE_INVALID_PATH = 2;
  ERROR_CODE_REQUEST_TOO_LARGE = 3;
  ERROR_CODE_RESOURCE_EXHAUSTED = 4;
  ERROR_CODE_PATH_NOT_FOUND = 5;
  ERROR_CODE_PARENT_NOT_FOUND = 6;
  ERROR_CODE_PERMISSION_DENIED = 7;
  ERROR_CODE_NOT_REGULAR_FILE = 8;
  ERROR_CODE_NOT_DIRECTORY = 9;
  ERROR_CODE_DIRECTORY_NOT_EMPTY = 10;
  ERROR_CODE_UNSUPPORTED_FILENAME = 11;
  ERROR_CODE_INVALID_CURSOR = 12;
  ERROR_CODE_CURSOR_EXPIRED = 13;
  ERROR_CODE_AGENT_UNAVAILABLE = 14;
  ERROR_CODE_AGENT_TIMEOUT = 15;
  ERROR_CODE_AGENT_PROTOCOL_ERROR = 16;
  ERROR_CODE_BACKEND_UNAVAILABLE = 17;
  ERROR_CODE_SERIAL_IN_USE = 18;
  ERROR_CODE_MONITOR_STOPPING = 19;
  ERROR_CODE_INTERNAL = 20;
  ERROR_CODE_OPERATION_CANCELLED = 21;
  ERROR_CODE_PRECONDITION_FAILED = 22;
  ERROR_CODE_ALREADY_EXISTS = 23;
  ERROR_CODE_UNSUPPORTED = 24;
}

message ErrorDetail {
  optional ErrorCode code = 1;
  google.protobuf.Duration retry_after = 2;
}
