syntax = "proto3";

package bento.v1;

import "common.proto";
import "google/protobuf/struct.proto";

service GuestControlService {
  rpc Register(RegisterGuestRequest) returns (RegisterGuestResponse);
}

service MetadataService {
  rpc GetMetadata(GetMetadataRequest) returns (GetMetadataResponse);
}

message RegisterGuestRequest {
  string guest_service_version = 1;
  SystemInfo system_info = 2;
}

message RegisterGuestResponse {
  bool accepted = 1;
  string message = 2;
}

message GetMetadataRequest {}

message GetMetadataResponse {
  int64 timestamp_unix = 1;
  bool rosetta_enabled = 2;
  google.protobuf.Struct config = 3;
}
