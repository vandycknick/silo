syntax = "proto3";

package silo.v1;

import "common.proto";
import "google/protobuf/duration.proto";

service GuestAgentService {
  rpc GetStatus(GetAgentStatusRequest) returns (AgentStatus);
  rpc WatchStatus(WatchAgentStatusRequest) returns (stream AgentStatus);
  rpc GetMetrics(GetAgentMetricsRequest) returns (AgentMetrics);
  rpc WatchMetrics(WatchAgentMetricsRequest) returns (stream AgentMetrics);
}

message GetAgentStatusRequest {}

message WatchAgentStatusRequest {
  google.protobuf.Duration heartbeat_interval = 1;
}

message GetAgentMetricsRequest {}

message WatchAgentMetricsRequest {
  google.protobuf.Duration interval = 1;
}
