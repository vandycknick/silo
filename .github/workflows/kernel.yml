name: Kernel

on:
  push:
    branches:
      - main
    paths:
      - resources/kernels/**
      - .github/workflows/kernel.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  TRACK: stable

jobs:
  build:
    name: stable ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-26.04
          - ubuntu-26.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Resolve build metadata
        id: kernel
        run: |
          arch="$(nix develop .#kernel --command make -s -C resources/kernels kernel-architecture)"
          version="$(nix develop .#kernel --command make -s -C resources/kernels kernel-version)"
          layout="$GITHUB_WORKSPACE/target/kernels/$TRACK/$arch"
          created="$(git show -s --format=%cI "$GITHUB_SHA")"
          source_date_epoch="$(git show -s --format=%ct "$GITHUB_SHA")"

          {
            printf 'arch=%s\n' "$arch"
            printf 'version=%s\n' "$version"
            printf 'layout=%s\n' "$layout"
            printf 'created=%s\n' "$created"
          } >> "$GITHUB_OUTPUT"
          {
            printf 'SOURCE_DATE_EPOCH=%s\n' "$source_date_epoch"
            printf 'KBUILD_BUILD_TIMESTAMP=@%s\n' "$source_date_epoch"
          } >> "$GITHUB_ENV"

      - name: Restore kernel caches
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/ccache
            ~/.cache/silo/kernels/downloads
          key: kernel-${{ runner.os }}-${{ steps.kernel.outputs.arch }}-${{ steps.kernel.outputs.version }}-${{ hashFiles('resources/kernels/configs/**', 'resources/kernels/sources.mk') }}
          restore-keys: |
            kernel-${{ runner.os }}-${{ steps.kernel.outputs.arch }}-${{ steps.kernel.outputs.version }}-

      - name: Configure compiler cache
        run: |
          nix develop .#kernel --command ccache --max-size 2G
          nix develop .#kernel --command ccache --zero-stats

      - name: Build OCI kernel artifact
        env:
          KBUILD_BUILD_HOST: github-actions
          KBUILD_BUILD_USER: silo
        run: |
          nix develop .#kernel --command make -C resources/kernels kernel \
            CC="ccache gcc" \
            BUILD_REVISION="$GITHUB_SHA" \
            BUILD_CREATED="${{ steps.kernel.outputs.created }}"
          nix develop .#kernel --command ccache --show-stats

      - name: Upload OCI layout
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kernel-oci-${{ env.TRACK }}-${{ steps.kernel.outputs.arch }}
          path: ${{ steps.kernel.outputs.layout }}
          if-no-files-found: error
          retention-days: 14

  publish:
    name: publish stable index
    needs: build
    runs-on: ubuntu-26.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    env:
      OCI_IMAGE: ghcr.io/${{ github.repository_owner }}/silo/kernel

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Download arm64 OCI layout
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: kernel-oci-stable-arm64
          path: ${{ github.workspace }}/target/kernels/${{ env.TRACK }}/arm64

      - name: Download amd64 OCI layout
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: kernel-oci-stable-x86_64
          path: ${{ github.workspace }}/target/kernels/${{ env.TRACK }}/x86_64

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: printf '%s' "$GHCR_TOKEN" | nix develop .#kernel --command oras login "$REGISTRY" --username "${{ github.actor }}" --password-stdin

      - name: Publish multi-platform kernel
        run: nix develop .#kernel --command make -C resources/kernels publish
