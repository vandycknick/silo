language = "C"
include_guard = "BENTO_POLICY_H"
autogen_warning = "/* Generated by cbindgen. Do not edit manually. */"
include_version = true
usize_is_size_t = true
documentation = false
cpp_compat = false
after_includes = """
typedef struct bento_policy_t bento_policy_t;
typedef struct bento_policy_http_context_t bento_policy_http_context_t;
"""

[export]
include = [
  "bento_policy_t",
  "bento_policy_http_context_t",
  "bento_policy_bytes_t",
  "bento_policy_buffer_t",
  "bento_policy_status_t",
  "BENTO_POLICY_OK",
  "BENTO_POLICY_LOAD_ERROR",
  "BENTO_POLICY_INVALID_ARGUMENT",
  "BENTO_POLICY_EVAL_ERROR",
  "BENTO_POLICY_PANIC",
  "bento_policy_parse_source",
  "bento_policy_snapshot_json",
  "bento_policy_http_context_from_json",
  "bento_policy_http_condition_evaluate",
  "bento_policy_free",
  "bento_policy_http_context_free",
  "bento_policy_buffer_free",
]

[parse.expand]
features = ["ffi"]
